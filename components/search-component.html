<!-- Search Component -->
<div class="search-container">
  <div class="search-input-wrapper">
    <input type="text" 
           id="search-input" 
           placeholder="Search documentation..." 
           autocomplete="off" 
           aria-autocomplete="list"
           aria-controls="search-results"
           aria-expanded="false"
           role="combobox" />
    <svg class="search-icon" 
         width="20" 
         height="20" 
         viewBox="0 0 24 24" 
         fill="none" 
         xmlns="http://www.w3.org/2000/svg"
         aria-hidden="true">
      <path d="M21 21L15 15M17 10C17 13.866 13.866 17 10 17C6.13401 17 3 13.866 3 10C3 6.13401 6.13401 3 10 3C13.866 3 17 6.13401 17 10Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </div>
  <div id="search-results" 
       class="search-results-dropdown" 
       role="listbox"
       aria-label="Search results">
  </div>
</div>

<style>
.search-container {
  position: relative;
  width: 100%;
  max-width: 400px;
}

.search-input-wrapper {
  position: relative;
  display: flex;
  align-items: center;
}

#search-input {
  width: 100%;
  padding: 8px 12px 8px 36px;
  border: 1px solid #d1d5db;
  border-radius: 6px;
  font-size: 14px;
  transition: border-color 0.2s;
  min-height: 44px; /* Minimum touch target size */
}

#search-input:focus {
  outline: none;
  border-color: #3b82f6;
  box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
}

.search-icon {
  position: absolute;
  left: 10px;
  color: #6b7280;
  pointer-events: none;
}

.search-results-dropdown {
  position: absolute;
  top: 100%;
  left: 0;
  right: 0;
  background: white;
  border: 1px solid #d1d5db;
  border-radius: 6px;
  box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
  margin-top: 4px;
  max-height: 300px;
  overflow-y: auto;
  z-index: 1000;
  display: none;
}

.search-results-dropdown.show {
  display: block;
}

.search-result {
  padding: 12px;
  border-bottom: 1px solid #f3f4f6;
  cursor: pointer;
}

.search-result:last-child {
  border-bottom: none;
}

.search-result a {
  text-decoration: none;
  color: inherit;
  display: block;
}

.search-result h3 {
  font-size: 14px;
  font-weight: 600;
  margin: 0 0 4px 0;
  color: #1f2937;
}

.search-result p {
  font-size: 13px;
  color: #6b7280;
  margin: 0;
}

.search-result:hover,
.search-result:focus {
  background-color: #f8fafc;
  outline: 2px solid #3b82f6;
  outline-offset: -2px;
}

.no-results {
  padding: 16px;
  text-align: center;
  color: #6b7280;
  font-size: 14px;
}

/* Focus indicator for search results */
.search-result:focus {
  background-color: #f0f9ff;
  outline: 2px solid #0ea5e9;
  outline-offset: -2px;
}

/* Hide search results from screen readers when not visible */
.search-results-dropdown:not(.show) {
  display: none;
}
</style>

<script type="module">
// Search Component Class with Accessibility and Error Handling
import { ComponentBase } from './base-component.js';

class SearchComponent extends ComponentBase {
  constructor() {
    super();
    this.input = document.getElementById('search-input');
    this.resultsContainer = document.getElementById('search-results');
    this.currentIndex = -1;
    this.searchData = [];
    this.fuse = null;
    
    if (this.input && this.resultsContainer) {
      this.init();
    }
  }
  
  async init() {
    try {
      // Add event listeners
      this.input.addEventListener('input', this.debounce(this.handleInput.bind(this), 300));
      this.input.addEventListener('keydown', this.handleKeyDown.bind(this));
      this.input.addEventListener('focus', this.handleFocus.bind(this));
      
      // Close search results when clicking outside
      const handleClickOutside = (e) => {
        if (this.resultsContainer.classList.contains('show') && 
            !this.input.contains(e.target) && 
            !this.resultsContainer.contains(e.target)) {
          this.hideResults();
        }
      };
      
      document.addEventListener('click', handleClickOutside);
      
      // Clean up event listener when component is destroyed
      window.addEventListener('beforeunload', () => {
        document.removeEventListener('click', handleClickOutside);
      });
      
      // Initialize Fuse.js for search
      await this.initializeSearch();
      
    } catch (error) {
      console.error('Failed to initialize search component:', error);
      this.showError('Search functionality is temporarily unavailable.');
    }
  }
  
  async initializeSearch() {
    return this.safeExecute(async () => {
      // Check if we're in a browser environment
      if (typeof window === 'undefined') {
        throw new Error('Search component can only be initialized in a browser environment');
      }
      
      // This would normally load search data from an external source
      // For now, we'll simulate with sample data
      this.searchData = [
        { title: 'Getting Started', content: 'Learn how to get started with Grounded Systems', url: '/getting-started' },
        { title: 'Design Principles', content: 'Core design principles of our system', url: '/principles' },
        { title: 'Component Library', content: 'Reusable components for documentation', url: '/components' }
      ];
      
      // Simulate Fuse.js initialization with better search algorithm
      this.fuse = {
        search: (query) => {
          if (!query || typeof query !== 'string') return [];
          
          // Normalize query for better matching
          const normalizedQuery = query.toLowerCase().trim();
          if (!normalizedQuery) return [];
          
          return this.searchData.filter(item => {
            // Check if query matches title or content
            const titleMatch = item.title && item.title.toLowerCase().includes(normalizedQuery);
            const contentMatch = item.content && item.content.toLowerCase().includes(normalizedQuery);
            return titleMatch || contentMatch;
          }).sort((a, b) => {
            // Prioritize title matches over content matches
            const aTitleMatch = a.title && a.title.toLowerCase().includes(normalizedQuery);
            const bTitleMatch = b.title && b.title.toLowerCase().includes(normalizedQuery);
            
            if (aTitleMatch && !bTitleMatch) return -1;
            if (!aTitleMatch && bTitleMatch) return 1;
            return 0;
          });
        }
      };
    }, (error) => {
      throw new Error('Failed to initialize search index: ' + error.message);
    });
  }
  
  debounce(func, wait) {
    let timeout;
    return function executedFunction(...args) {
      const later = () => {
        clearTimeout(timeout);
        func(...args);
      };
      clearTimeout(timeout);
      timeout = setTimeout(later, wait);
    };
  }
  
  async handleInput(event) {
    // Validate event and target
    if (!event || !event.target) {
      console.warn('Invalid event object passed to handleInput');
      return;
    }
    
    await this.safeExecute(async () => {
      const query = event.target.value.trim();
      
      // Early return for empty queries
      if (query.length === 0) {
        this.hideResults();
        return;
      }
      
      // Update ARIA attributes
      this.input.setAttribute('aria-expanded', 'true');
      this.input.setAttribute('aria-activedescendant', '');
      
      // Perform search with validation
      if (!this.fuse || typeof this.fuse.search !== 'function') {
        throw new Error('Search index not properly initialized');
      }
      
      const results = this.fuse.search(query);
      
      // Display results
      this.displayResults(results);
    }, (error) => {
      console.error('Search error:', error);
      this.showError('Search failed. Please try again.');
    });
  }
  
  handleKeyDown(event) {
    // Validate event
    if (!event || !event.key) {
      return;
    }
    
    const results = this.resultsContainer.querySelectorAll('.search-result');
    
    switch (event.key) {
      case 'ArrowDown':
        event.preventDefault();
        this.currentIndex = Math.min(this.currentIndex + 1, results.length - 1);
        this.focusResult(this.currentIndex);
        break;
        
      case 'ArrowUp':
        event.preventDefault();
        this.currentIndex = Math.max(this.currentIndex - 1, -1);
        if (this.currentIndex === -1) {
          this.input.focus();
          this.input.setAttribute('aria-activedescendant', '');
        } else {
          this.focusResult(this.currentIndex);
          // Update aria-activedescendant for screen readers
          const activeResult = results[this.currentIndex];
          if (activeResult) {
            this.input.setAttribute('aria-activedescendant', activeResult.id);
          }
        }
        break;
        
      case 'Enter':
        if (this.currentIndex >= 0 && results[this.currentIndex]) {
          event.preventDefault();
          results[this.currentIndex].click();
        }
        break;
        
      case 'Escape':
        event.preventDefault();
        this.hideResults();
        this.input.blur();
        break;
        
      case 'Tab':
        // Allow tab key to function normally
        break;
        
      default:
        // Reset index for character keys (allows typing to restart navigation)
        if (event.key.length === 1) {
          this.currentIndex = -1;
          this.input.setAttribute('aria-activedescendant', '');
        }
    }
  }
  
  handleFocus() {
    // Reset current index when input gains focus
    this.currentIndex = -1;
    this.input.setAttribute('aria-activedescendant', '');
  }
  
  displayResults(results) {
    // Validate results parameter
    if (!Array.isArray(results)) {
      console.warn('Invalid results array passed to displayResults');
      this.showError('Search results format invalid.');
      return;
    }
    
    if (results.length === 0) {
      this.resultsContainer.innerHTML = '<div class="no-results">No results found</div>';
      this.resultsContainer.classList.add('show');
      return;
    }
    
    const resultsHTML = results.map((result, index) => `
      <div class="search-result" 
           role="option" 
           tabindex="-1" 
           id="search-result-${index}"
           data-url="${this.escapeHtml(result.url || '#')}"
           aria-selected="false">
        <h3>${this.escapeHtml(result.title || '')}</h3>
        <p>${this.escapeHtml(result.content || '')}</p>
      </div>
    `).join('');
    
    this.resultsContainer.innerHTML = resultsHTML;
    this.resultsContainer.classList.add('show');
    
    // Add click handlers to results
    this.resultsContainer.querySelectorAll('.search-result').forEach((result, index) => {
      // Remove any existing event listeners to prevent duplicates
      const clone = result.cloneNode(true);
      result.parentNode.replaceChild(clone, result);
      
      clone.addEventListener('click', (e) => {
        e.preventDefault();
        const url = clone.getAttribute('data-url');
        if (url && url !== '#') {
          window.location.href = url;
        }
      });
      
      clone.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' || e.key === ' ') {
          e.preventDefault();
          clone.click();
        }
      });
      
      // Add hover and focus indicators for better UX
      clone.addEventListener('mouseenter', () => {
        // Clear previous selection
        this.resultsContainer.querySelectorAll('.search-result').forEach(r => {
          r.setAttribute('aria-selected', 'false');
        });
        // Mark this result as selected
        clone.setAttribute('aria-selected', 'true');
        this.currentIndex = index;
      });
    });
  }
  
  hideResults() {
    this.resultsContainer.classList.remove('show');
    this.input.setAttribute('aria-expanded', 'false');
    this.input.setAttribute('aria-activedescendant', '');
    this.currentIndex = -1;
  }
  
  focusResult(index) {
    const results = this.resultsContainer.querySelectorAll('.search-result');
    if (index >= 0 && index < results.length) {
      // Clear previous selection
      this.resultsContainer.querySelectorAll('.search-result').forEach(r => {
        r.setAttribute('aria-selected', 'false');
      });
      // Focus and mark this result as selected
      results[index].focus();
      results[index].setAttribute('aria-selected', 'true');
    }
  }
  
  showError(message) {
    // Sanitize error message
    const sanitizedMessage = this.escapeHtml(message || 'An error occurred');
    
    this.resultsContainer.innerHTML = `<div class="no-results">${sanitizedMessage}</div>`;
    this.resultsContainer.classList.add('show');
    
    // Hide error after 5 seconds
    setTimeout(() => {
      this.hideResults();
    }, 5000);
  }
  
  // Utility method to escape HTML to prevent XSS
  escapeHtml(unsafe) {
    if (typeof unsafe !== 'string') {
      return '';
    }
    
    return unsafe
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;")
      .replace(/'/g, "&#039;");
  }
}

// Initialize the search component when DOM is loaded
document.addEventListener('DOMContentLoaded', () => {
  try {
    new SearchComponent();
  } catch (error) {
    console.error('Failed to initialize search component:', error);
  }
});
</script>
