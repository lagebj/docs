<!-- Enhanced Navigation Styles -->
<link rel="stylesheet" href="/components/navigation-enhanced.css">

<script src="/components/navigation.js"></script>
<script src="/scripts/search.js"></script>
<script>
// Inject search component into the navbar
document.addEventListener('DOMContentLoaded', () => {
  const searchContainer = document.getElementById('desktop-search');
  if (searchContainer) {
    fetch('/components/search-component.html')
      .then(response => response.text())
      .then(html => {
        searchContainer.innerHTML = html;
        
        // Load search component functionality
        if (typeof SearchComponent !== 'undefined') {
          new SearchComponent();
        }
      })
      .catch(error => {
        console.error('Failed to load search component:', error);
      });
  }
});
</script>
